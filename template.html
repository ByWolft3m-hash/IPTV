<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wolft3m IPTV Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7c3aed; --bg: #0b0e14; --panel: #161b22; --text: #e2e8f0; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid #30363d; display: flex; flex-direction: column; }
        .search-area { padding: 15px; border-bottom: 1px solid #30363d; }
        #buscador { width: 100%; padding: 10px; background: #0f1117; border: 1px solid var(--primary); color: white; border-radius: 5px; box-sizing: border-box; }
        .scroll-area { flex: 1; overflow-y: auto; }
        .item { padding: 12px 20px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #21262d; font-size: 0.9em; }
        .item:hover { background: #1f242e; color: var(--primary); }
        
        /* Reproductor y Título */
        .player-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1e2e 0%, #0b0e14 100%); }
        #reproduciendo-titulo { margin-bottom: 15px; font-size: 1.4em; font-weight: 600; color: var(--primary); text-shadow: 0 0 10px rgba(124, 58, 237, 0.5); }
        video { width: 90%; max-width: 950px; border-radius: 12px; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(124, 58, 237, 0.3); }
        
        .account-info { padding: 15px; font-size: 0.75em; background: #0f1117; border-top: 1px solid #30363d; color: #888; }
        .footer-brand { padding: 10px; text-align: center; font-size: 0.8em; font-weight: 600; color: var(--primary); border-top: 1px solid #30363d; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding: 20px; font-weight: 600; color: var(--primary);">Wolft3m IPTV</div>
    <div class="search-area">
        <input type="text" id="buscador" placeholder="🔍 Buscar canal..." onkeyup="filtrarCanales()">
    </div>
    <div class="scroll-area" id="menu-container"></div>
    <div class="account-info" id="acc-details">Cargando...</div>
    <div class="footer-brand">By| <a href="https://t.me/Wolft3m" style="color:var(--primary); text-decoration:none;">@Wolft3m</a></div>
</div>

<div class="player-area">
    <div id="reproduciendo-titulo">Selecciona un canal</div>
    <video id="video" controls autoplay></video>
</div>

<script>
    var categorias = []; 
    var info_cuenta = {};
    const container = document.getElementById('menu-container');

    window.onload = () => {
        if(info_cuenta.user_info) {
            document.getElementById('acc-details').innerHTML = 
                `Usuario: <b>${info_cuenta.user_info.username}</b><br>
                 Estado: ${info_cuenta.user_info.status}<br>
                 Vence: ${info_cuenta.user_info.exp_date ? new Date(info_cuenta.user_info.exp_date * 1000).toLocaleDateString() : 'N/A'}`;
        }
        renderCategorias();
    }

    function renderCategorias() {
        container.innerHTML = '';
        categorias.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = "📁 " + cat.category_name;
            div.onclick = () => cargarCanales(cat.category_id);
            container.appendChild(div);
        });
    }

    // Buscador en tiempo real
    function filtrarCanales() {
        let filter = document.getElementById('buscador').value.toUpperCase();
        let items = document.querySelectorAll('.item');
        items.forEach(item => {
            item.style.display = item.innerText.toUpperCase().indexOf(filter) > -1 ? "" : "none";
        });
    }

    async function cargarCanales(catId) {
        const base = `${info_cuenta.server_info.server_protocol}://${info_cuenta.server_info.url}:${info_cuenta.server_info.port}`;
        const url = `${base}/player_api.php?username=${info_cuenta.user_info.username}&password=${info_cuenta.user_info.password}&action=get_live_streams&category_id=${catId}`;
        const res = await fetch(url);
        const data = await res.json();
        
        container.innerHTML = `<div class="item" style="color:var(--primary)" onclick="renderCategorias()">⬅ Volver a Categorías</div>`;
        data.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = "📺 " + ch.name;
            div.onclick = () => reproducir(ch.stream_id, ch.name);
            container.appendChild(div);
        });
    }

    function reproducir(id, nombre) {
        document.getElementById('reproduciendo-titulo').innerText = "Reproduciendo: " + nombre;
        const url = `${info_cuenta.server_info.server_protocol}://${info_cuenta.server_info.url}:${info_cuenta.server_info.port}/live/${info_cuenta.user_info.username}/${info_cuenta.user_info.password}/${id}.m3u8`;
        const video = document.getElementById('video');
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        video.play();
    }
</script>
</body>
</html>

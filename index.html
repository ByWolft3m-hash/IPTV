<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wolft3m IPTV Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #0b0e14; color: white; display: flex; height: 100vh; font-family: sans-serif; }
        .sidebar { width: 350px; background: #161b22; overflow-y: auto; padding: 10px; }
        .item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; }
        .item:hover { background: #252a33; }
        .player-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        video { width: 80%; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar" id="menu-container">Cargando canales...</div>
    <div class="player-area">
        <h2 id="titulo">Selecciona un canal</h2>
        <video id="video" controls autoplay></video>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const server = params.get('server'); // Ejemplo: http://jametv.lat:8080
        const user = params.get('user');
        const pass = params.get('pass');
        // Proxy para evitar bloqueo CORS
        const proxy = "https://corsproxy.io/?"; 

        async function init() {
            const api = `${proxy}${server}/player_api.php?username=${user}&password=${pass}&action=get_live_categories`;
            try {
                const res = await fetch(api);
                const cats = await res.json();
                renderCats(cats);
            } catch(e) { document.getElementById('menu-container').innerText = "Error de conexión: " + e; }
        }

        function renderCats(cats) {
            const menu = document.getElementById('menu-container');
            menu.innerHTML = "";
            cats.forEach(c => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = c.category_name;
                div.onclick = () => loadChannels(c.category_id);
                menu.appendChild(div);
            });
        }

        async function loadChannels(id) {
            const api = `${proxy}${server}/player_api.php?username=${user}&password=${pass}&action=get_live_streams&category_id=${id}`;
            const res = await fetch(api);
            const chs = await res.json();
            const menu = document.getElementById('menu-container');
            menu.innerHTML = `<div class="item" onclick="location.reload()">⬅ Volver</div>`;
            chs.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = ch.name;
                div.onclick = () => play(ch.stream_id, ch.name);
                menu.appendChild(div);
            });
        }

        function play(id, name) {
            document.getElementById('titulo').innerText = name;
            const video = document.getElementById('video');
            const source = `${server}/live/${user}/${pass}/${id}.m3u8`;
            const hls = new Hls();
            hls.loadSource(source);
            hls.attachMedia(video);
            video.play();
        }

        init();
    </script>
</body>
</html>
